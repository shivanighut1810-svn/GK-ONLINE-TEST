<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>राजमुद्रा अकॅडमी येवला - भारत का इतिहास MCQ</title>
    <style>
        :root { --primary: #e67e22; --dark: #2c3e50; --success: #27ae60; --purple: #8e44ad; --danger: #c0392b; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; margin: 0; padding-bottom: 50px; }
        header { background: var(--dark); color: white; padding: 15px; text-align: center; border-bottom: 5px solid var(--primary); position: sticky; top: 0; z-index: 1000; }
        .timer-box { background: var(--danger); color: white; padding: 5px 15px; border-radius: 5px; font-size: 1.2em; margin-top: 8px; display: inline-block; }
        .container { display: flex; flex-wrap: wrap; max-width: 1200px; margin: 20px auto; gap: 20px; padding: 10px; }
        .quiz-area { flex: 2; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); min-width: 320px; }
        .sidebar { flex: 1; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); min-width: 280px; height: fit-content; }
        .q-text { font-size: 1.3em; color: var(--dark); font-weight: bold; margin-bottom: 5px; }
        .q-hindi { font-size: 1.1em; color: #555; font-style: italic; margin-bottom: 20px; display: block; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .options { list-style: none; padding: 0; }
        .options li { margin: 12px 0; padding: 15px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; display: flex; align-items: center; transition: 0.2s; }
        .options li:hover { background: #fff3e0; border-color: var(--primary); }
        .options input { margin-right: 15px; transform: scale(1.4); }
        .palette { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; max-height: 350px; overflow-y: auto; padding: 5px; }
        .dot { height: 40px; border-radius: 6px; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; font-weight: bold; background: white; }
        .answered { background: var(--success) !important; color: white; border: none; }
        .marked { background: var(--purple) !important; color: white; border: none; }
        .current { border: 3px solid var(--primary); box-shadow: 0 0 8px var(--primary); }
        .btn-group { display: flex; gap: 10px; margin-top: 25px; }
        button { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; flex: 1; color: white; font-size: 1em; }
        .btn-next { background: var(--success); }
        .btn-review { background: var(--purple); }
        .btn-back { background: #7f8c8d; }
        .btn-submit { background: var(--danger); width: 100%; margin-top: 20px; font-size: 1.2em; }
        #result-area { display: none; background: white; padding: 30px; border-radius: 12px; margin: 20px auto; max-width: 900px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .result-header { text-align: center; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        .exp-box { border-bottom: 1px solid #eee; padding: 20px 0; }
        footer { text-align: center; padding: 20px; color: #444; font-weight: bold; background: #ddd; margin-top: 30px; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0">राजमुद्रा अकॅडमी, येवला</h2>
    <p style="margin:5px 0">संचालक: शुभम निघुट सर (७७०९१५६०३१)</p>
    <div class="timer-box">शिल्लक वेळ: <span id="timer">20:00</span></div>
</header>

<div class="container" id="main-test">
    <div class="quiz-area">
        <div id="question-container"></div>
        <div class="btn-group">
            <button class="btn-back" onclick="prevQuest()">Back</button>
            <button class="btn-review" onclick="markForReview()">Review</button>
            <button class="btn-next" onclick="nextQuest()">Save & Next</button>
        </div>
    </div>
    <div class="sidebar">
        <h3 style="margin-top:0">Question Palette</h3>
        <div class="palette" id="palette"></div>
        <button class="btn-submit" onclick="submitQuiz()">Final Submit</button>
    </div>
</div>

<div id="result-area">
    <div class="result-header">
        <h1>चाचणी निकाल</h1>
        <h2 id="score-card" style="color: var(--success);"></h2>
    </div>
    <div id="explanation-list"></div>
    <button onclick="location.reload()" style="background:var(--primary); color:white; width:220px; margin: 30px auto; display: block; height: 50px;">पुन्हा प्रयत्न करा</button>
</div>

<footer>&copy; 2026 राजमुद्रा अकॅडमी येवला | शुभम निघुट सर</footer>

<script>
    const questions = [
        { mr: "वेदांना कोणत्या प्रकारचा ग्रंथ मानला जातो?", hi: "वेदों को किस प्रकार का ग्रंथ माना जाता है?", options: ["ऐतिहासिक", "धार्मिक", "वैज्ञानिक", "साहित्यिक"], ans: 1 },
        { mr: "उपनिषद कोणत्या तत्त्वज्ञानाचा आधार आहेत?", hi: "उपनिषद किस दर्शन का आधार हैं?", options: ["सांख्य", "योग", "अद्वैत", "नयाय"], ans: 2 },
        { mr: "रामायणाचे लेखक कोण आहेत?", hi: "रामायण के रचयिता कौन हैं?", options: ["व्यास", "वाल्मीकि", "कालिदास", "तुलसीदास"], ans: 1 },
        { mr: "महाभारताचे लेखक कोण आहेत?", hi: "महाभारत के रचयिता कौन हैं?", options: ["वाल्मीकि", "व्यास", "शंकराचार्य", "पाणिनी"], ans: 1 },
        { mr: "भगवद्गीतेत उपदेश कुणाला दिला?", hi: "भगवद्गीता में उपदेश किसे दिया गया?", options: ["अर्जुन", "भीम", "युधिष्ठिर", "कर्ण"], ans: 0 },
        { mr: "पुराणांची संख्या किती मानली जाते?", hi: "पुराणों की संख्या कितनी मानी जाती है?", options: ["10", "12", "18", "20"], ans: 2 },
        { mr: "ऋग्वेदात किती मंडल आहेत?", hi: "ऋग्वेद में कितने मंडल हैं?", options: ["8", "10", "12", "14"], ans: 1 },
        { mr: "ऋग्वेदात किती सूक्त आहेत?", hi: "ऋग्वेद में कितने सूक्त हैं?", options: ["1000", "1028", "1500", "2000"], ans: 1 },
        { mr: "ऋग्वेदातील प्रमुख देवता नाही कोण?", hi: "ऋग्वेद का प्रमुख देवता कौन नहीं है?", options: ["अग्नि", "इंद्र", "वरुण", "गणेश"], ans: 3 },
        { mr: "सामवेद कशाशी संबंधित आहे?", hi: "सामवेद किससे संबंधित है?", options: ["युद्ध", "संगीत", "राजनीति", "कृषि"], ans: 1 },
        { mr: "सामवेदात किती मंत्र आहेत?", hi: "सामवेद में कुल कितने मंत्र हैं?", options: ["1500", "1875", "2000", "1028"], ans: 1 },
        { mr: "यजुर्वेद कशाशी संबंधित आहे?", hi: "यजुर्वेद किससे संबंधित है?", options: ["संगीत", "यज्ञ", "दर्शन", "विज्ञान"], ans: 1 },
        { mr: "यजुर्वेदाचे किती भाग आहेत?", hi: "यजुर्वेद के कितने भाग हैं?", options: ["1", "2", "3", "4"], ans: 1 },
        { mr: "अथर्ववेदात किती कांड आहेत?", hi: "अथर्ववेद में कितने कांड हैं?", options: ["10", "15", "20", "25"], ans: 2 },
        { mr: "अथर्ववेद कशाशी संबंधित आहे?", hi: "अथर्ववेद किससे संबंधित है?", options: ["युद्ध", "जीवन", "संगीत", "व्यापार"], ans: 1 },
        { mr: "मेसोपोटामिया सभ्यता कोणत्या नद्यांदरम्यान होती?", hi: "मेसोपोटामिया सभ्यता किन नदियों के बीच थी?", options: ["गंगा-यमुना", "नील", "टिगरिस-यूफ्रेटीस", "सिंधु"], ans: 2 },
        { mr: "क्यूनिफॉर्म लिपी कोणत्या सभ्यतेशी संबंधित आहे?", hi: "क्यूनिफॉर्म लिपि किस सभ्यता से संबंधित है?", options: ["मिस्र", "हड़प्पा", "मेसोपोटामिया", "चीन"], ans: 2 },
        { mr: "मिस्र सभ्यता कोणत्या नदीकाठी विकसित झाली?", hi: "मिस्र सभ्यता किस नदी के किनारे विकसित हुई?", options: ["गंगा", "नील", "सिंधु", "ब्रह्मपुत्र"], ans: 1 },
        { mr: "पिरॅमिड कोणत्या सभ्यतेची ओळख आहे?", hi: "पिरामिड किस सभ्यता की पहचान है?", options: ["भारत", "चीन", "मिस्र", "रोम"], ans: 2 },
        { mr: "हडप्पा सभ्यतेची लिपी कशी आहे?", hi: "हड़प्पा सभ्यता की लिपि कैसी है?", options: ["पढ़ी गई", "आंशिक पढ़ी", "अपठित", "संस्कृत"], ans: 2 },
        { mr: "हडप्पा सभ्यता कोणत्या नदी खोऱ्यात होती?", hi: "हड़प्पा सभ्यता किस नदी घाटी में थी?", options: ["गंगा", "सिंधु", "नर्मदा", "गोदावरी"], ans: 1 },
        { mr: "वैदिक सभ्यतेचा मुख्य आधार काय होता?", hi: "वैदिक सभ्यता का मुख्य आधार क्या था?", options: ["शहर", "ग्राम", "उद्योग", "व्यापार"], ans: 1 },
        { mr: "जैन धर्माचे संस्थापक कोण आहेत?", hi: "जैन धर्म के संस्थापक कौन हैं?", options: ["बुद्ध", "महावीर", "अशोक", "चाणक्य"], ans: 1 },
        { mr: "महावीर स्वामी कितवे तीर्थंकर होते?", hi: "महावीर स्वामी कौन से तीर्थंकर थे?", options: ["22", "23", "24", "25"], ans: 2 },
        { mr: "जैन धर्मातील पहिले महाव्रत कोणते?", hi: "जैन धर्म का पहला महाव्रत क्या है?", options: ["सत्य", "अहिंसा", "अस्तेय", "ब्रह्मचर्य"], ans: 1 },
        { mr: "बुद्धांचा जन्म कुठे झाला?", hi: "बुद्ध का जन्म कहाँ हुआ?", options: ["बोधगया", "लुंबिनी", "सारनाथ", "कुशीनगर"], ans: 1 },
        { mr: "बुद्धांचे खरे नाव काय होते?", hi: "बुद्ध का वास्तविक नाम क्या था?", options: ["अशोक", "सिद्धार्थ", "राहुल", "आनंद"], ans: 1 },
        { mr: "ज्ञानप्राप्ती कुठे झाली?", hi: "ज्ञान प्राप्ति कहाँ हुई?", options: ["सारनाथ", "लुंबिनी", "बोधगया", "पाटलिपुत्र"], ans: 2 },
        { mr: "चार आर्य सत्य कशाशी संबंधित आहेत?", hi: "चार आर्य सत्य किससे संबंधित हैं?", options: ["जैन धर्म", "बौद्ध धर्म", "हिंदू धर्म", "सिख धर्म"], ans: 1 },
        { mr: "अष्टांग मार्गात किती अंग आहेत?", hi: "अष्टांग मार्ग में कितने अंग हैं?", options: ["6", "7", "8", "9"], ans: 2 },
        { mr: "मगधची राजधानी काय होती?", hi: "मगध की राजधानी क्या थी?", options: ["वैशाली", "राजगृह", "तक्षशिला", "उज्जैन"], ans: 1 },
        { mr: "वज्जीची राजधानी काय होती?", hi: "वज्जि की राजधानी क्या थी?", options: ["वैशाली", "चंपा", "कौशांबी", "पाटलिपुत्र"], ans: 0 },
        { mr: "गांधारची राजधानी काय होती?", hi: "गांधार की राजधानी क्या थी?", options: ["मथुरा", "तक्षशिला", "उज्जैन", "वैशाली"], ans: 1 },
        { mr: "अवंतीची राजधानी काय होती?", hi: "अवंति की राजधानी क्या थी?", options: ["उज्जैन", "पाटलिपुत्र", "काशी", "श्रावस्ती"], ans: 0 },
        { mr: "मौर्य साम्राज्याची स्थापना कोणी केली?", hi: "मौर्य साम्राज्य की स्थापना किसने की?", options: ["अशोक", "चंद्रगुप्त", "बिंदुसार", "नंद"], ans: 1 },
        { mr: "चंद्रगुप्त मौर्यांनी कधी स्थापना केली?", hi: "चंद्रगुप्त मौर्य ने कब स्थापना की?", options: ["300 BCE", "321 BCE", "350 BCE", "250 BCE"], ans: 1 },
        { mr: "मौर्य साम्राज्याची राजधानी काय होती?", hi: "मौर्य साम्राज्य की राजधानी क्या थी?", options: ["दिल्ली", "पाटलिपुत्र", "उज्जैन", "वाराणसी"], ans: 1 },
        { mr: "अशोकाचा प्रसिद्ध युद्ध कोणता?", hi: "अशोक का प्रसिद्ध युद्ध कौन सा था?", options: ["पानीपत", "कलिंग", "प्लासी", "हल्दीघाटी"], ans: 1 },
        { mr: "अशोकांनी कोणता धर्म स्वीकारला?", hi: "अशोक ने कौन सा धर्म अपनाया?", options: ["जैन", "बौद्ध", "हिंदू", "सिख"], ans: 1 },
        { mr: "शुंग वंशाचा संस्थापक कोण?", hi: "शुंग वंश का संस्थापक कौन था?", options: ["अशोक", "पुष्यमित्र", "चंद्रगुप्त", "बिंदुसार"], ans: 1 },
        { mr: "शुंग वंशाची राजधानी काय होती?", hi: "शुंग वंश की राजधानी क्या थी?", options: ["उज्जैन", "पाटलिपुत्र", "दिल्ली", "काशी"], ans: 1 },
        { mr: "सातवाहन साम्राज्याचा प्रदेश कुठे होता?", hi: "सातवाहन साम्राज्य का क्षेत्र कहाँ था?", options: ["उत्तर भारत", "दक्षिण भारत", "महाराष्ट्र-आंध्र", "पंजाब"], ans: 2 },
        { mr: "सातवाहनांचा प्रमुख शासक कोण?", hi: "सातवाहन का प्रमुख शासक कौन था?", options: ["अशोक", "गौतमीपुत्र सातकर्णी", "कनिष्क", "हर्ष"], ans: 1 },
        { mr: "हडप्पा सभ्यतेची प्रमुख वैशिष्ट्य काय?", hi: "हड़प्पा सभ्यता की प्रमुख विशेषता क्या थी?", options: ["कृषि", "नगर नियोजन", "युद्ध", "राजनीति"], ans: 1 },
        { mr: "मिस्रमध्ये शवसंरक्षणाला काय म्हणतात?", hi: "मिस्र में शव संरक्षण को क्या कहते हैं?", options: ["समाधि", "ममीकरण", "संस्कार", "दाह"], ans: 1 },
        { mr: "वेदांची रचना कोणत्या काळात झाली?", hi: "वेदों की रचना किस काल में हुई?", options: ["वैदिक", "आधुनिक", "मध्यकालीन", "प्राचीन"], ans: 0 },
        { mr: "वैदिक काळातील समाज कसा होता?", hi: "वैदिक काल में समाज कैसा था?", options: ["औद्योगिक", "ग्राम आधारित", "शहरी", "व्यापारिक"], ans: 1 },
        { mr: "बौद्ध धर्माचा पहिला उपदेश कुठे दिला?", hi: "बौद्ध धर्म का पहला उपदेश कहाँ दिया गया?", options: ["बोधगया", "सारनाथ", "लुंबिनी", "पाटलिपुत्र"], ans: 1 },
        { mr: "अष्टांग मार्गाचा उद्देश काय आहे?", hi: "अष्टांग मार्ग का उद्देश्य क्या है?", options: ["धन", "सुख", "मोक्ष", "युद्ध"], ans: 2 },
        { mr: "जैन धर्माचा प्रमुख सिद्धांत काय आहे?", hi: "जैन धर्म का प्रमुख सिद्धांत क्या है?", options: ["अहिंसा", "युद्ध", "व्यापार", "सत्ता"], ans: 0 }
    ];

    let currentIdx = 0;
    let userAnswers = new Array(questions.length).fill(null);
    let reviewStatus = new Array(questions.length).fill(false);
    let timeLeft = 1200;

    const timerInterval = setInterval(() => {
        if(timeLeft <= 0) {
            clearInterval(timerInterval);
            alert("वेळ संपली आहे!");
            submitQuiz();
        } else {
            timeLeft--;
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
        }
    }, 1000);

    function loadQuestion() {
        const qData = questions[currentIdx];
        let html = `<div class="question-box">
            <p class="q-text">Q${currentIdx + 1}. ${qData.mr}</p>
            <span class="q-hindi">${qData.hi}</span>
            <ul class="options">`;
        qData.options.forEach((opt, i) => {
            let checked = userAnswers[currentIdx] === i ? 'checked' : '';
            html += `<li onclick="selectOpt(${i})">
                <input type="radio" name="opt" id="o${i}" ${checked}> ${opt}
            </li>`;
        });
        html += `</ul></div>`;
        document.getElementById('question-container').innerHTML = html;
        updatePalette();
    }

    function selectOpt(i) {
        userAnswers[currentIdx] = i;
        document.getElementById(`o${i}`).checked = true;
        updatePalette();
    }

    function nextQuest() { if(currentIdx < questions.length - 1) { currentIdx++; loadQuestion(); } }
    function prevQuest() { if(currentIdx > 0) { currentIdx--; loadQuestion(); } }
    function markForReview() { reviewStatus[currentIdx] = !reviewStatus[currentIdx]; updatePalette(); nextQuest(); }

    function updatePalette() {
        let paletteHtml = "";
        for(let i=0; i<questions.length; i++) {
            let statusClass = "";
            if(i === currentIdx) statusClass = "current";
            else if(reviewStatus[i]) statusClass = "marked";
            else if(userAnswers[i] !== null) statusClass = "answered";
            paletteHtml += `<div class="dot ${statusClass}" onclick="jumpTo(${i})">${i+1}</div>`;
        }
        document.getElementById('palette').innerHTML = paletteHtml;
    }

    function jumpTo(i) { currentIdx = i; loadQuestion(); }

    function submitQuiz() {
        if(!confirm("तुम्हाला खात्री आहे का? टेस्ट सबमिट होणार आहे.")) return;
        clearInterval(timerInterval);
        document.getElementById('main-test').style.display = "none";
        document.getElementById('result-area').style.display = "block";
        
        let score = 0;
        let expHtml = "";
        questions.forEach((q, i) => {
            const isCorrect = userAnswers[i] === q.ans;
            if(isCorrect) score++;
            expHtml += `<div class="exp-box">
                <p><b>Q${i+1}. ${q.mr}</b></p>
                <p>तुमचे उत्तर: <span style="color:${isCorrect ? 'green':'red'}">${userAnswers[i] !== null ? q.options[userAnswers[i]] : 'सोडले'}</span></p>
                <p style="color:green">योग्य उत्तर: ${q.options[q.ans]}</p>
            </div>`;
        });
        document.getElementById('score-card').innerText = `तुमचा स्कोअर: ${score} / ${questions.length}`;
        document.getElementById('explanation-list').innerHTML = expHtml;
        window.scrollTo(0,0);
    }

    loadQuestion();
</script>
</body>
</html>
